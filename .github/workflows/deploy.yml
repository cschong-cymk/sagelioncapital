name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Currently deployed at https://cschong-cymk.github.io/cart-transformation/
      # (no custom domain yet), so vite.config.js defaults base to
      # '/cart-transformation/'. Once cartXform.com's DNS is verified and added
      # as a custom domain in Settings -> Pages, set base back to '/' in
      # vite.config.js (or pass VITE_BASE: / here) and restore public/CNAME.
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          # First-time setup: the Pages "site" object isn't registered with
          # GitHub's API yet even though Settings -> Pages shows "GitHub
          # Actions" selected (that previously only ever got fulfilled by the
          # legacy branch-based builder). This flag has the action enable
          # Pages itself instead of erroring with "Get Pages site failed".
          # Safe to leave in permanently — it's a no-op once Pages exists.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
